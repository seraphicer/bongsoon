<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X LIVE STREAM DASHBOARD - LOBBY</title>
    <style>
        :root {
            --bg-main: #0c0d19;
            --border-pink: #ff4a8d;
            --text-white: #ffffff;
            --text-muted: #7d819d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Malgun Gothic', system-ui, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-white); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        #main-lobby-page { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; background: radial-gradient(circle at center, #1b1635 0%, #0c0d19 70%); padding: 20px; }
        .lobby-container { text-align: center; max-width: 600px; width: 100%; }
        .lobby-tag { border: 1px solid var(--border-pink); color: var(--border-pink); padding: 4px 14px; font-size: 12px; font-weight: bold; border-radius: 20px; display: inline-block; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .lobby-title { font-size: 36px; font-weight: 900; margin-bottom: 10px; }
        .lobby-subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; }
        
        .mode-wrapper { display: flex; flex-direction: column; gap: 15px; align-items: center; width: 100%; }
        .mode-link { text-decoration: none; width: 100%; max-width: 400px; display: block; }
        .mode-select-btn { background: linear-gradient(135deg, #181932 0%, #111224 100%); border: 2px solid rgba(255, 74, 141, 0.4); border-radius: 16px; padding: 25px 40px; width: 100%; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); display: flex; justify-content: center; align-items: center; }
        .mode-select-btn:hover { border-color: var(--border-pink); transform: translateY(-5px); }
        .mode-name { font-size: 20px; font-weight: 800; color: #ffffff; }
    </style>
</head>
<body>

    <div id="main-lobby-page">
        <div class="lobby-container">
            <div class="lobby-tag">Streamer Dashboard System</div>
            <h1 class="lobby-title">🎮 방송용 스코어보드 시스템</h1>
            <p class="lobby-subtitle">진행할 챌린지 모드를 선택하면 전용 관리 화면으로 연결됩니다.</p>
            
            <div class="mode-wrapper">
                <a href="Kill.html" class="mode-link">
                    <button class="mode-select-btn">
                        <span class="mode-name">⚔️ 벽킬내기</span>
                    </button>
                </a>

                <a href="Bingo.html" class="mode-link">
                    <button class="mode-select-btn">
                        <span class="mode-name">🎯 빙고판 시스템</span>
                    </button>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
